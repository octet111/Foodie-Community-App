name: Supabase Weekly Backup

on:
  schedule:
    # 毎週日曜 06:00 JST（= 土曜 21:00 UTC）
    - cron: "0 21 * * 6"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Dump database
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD secrets are required."
            exit 1
          fi

          # link より --db-url の方が CI では安定（特殊文字パスワードは URL エンコード）
          ENCODED_PASSWORD=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['SUPABASE_DB_PASSWORD'], safe=''))")
          DB_URL="postgresql://postgres.nzrawtaclloafhkgoeuc:${ENCODED_PASSWORD}@aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres"

          echo "Starting db dump..."
          supabase db dump --db-url "$DB_URL" -f "backup-$(date -u +%Y%m%d).sql"
          echo "Dump complete."

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_number }}
          path: backup-*.sql
          retention-days: 30
