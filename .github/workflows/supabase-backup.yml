name: Supabase Weekly Backup

on:
  schedule:
    # 毎週日曜 06:00 JST（= 土曜 21:00 UTC）
    - cron: "0 21 * * 6"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Dump database
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD secrets are required."
            exit 1
          fi
          supabase link --project-ref nzrawtaclloafhkgoeuc
          supabase db dump --linked -f "backup-$(date -u +%Y%m%d).sql"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_number }}
          path: backup-*.sql
          retention-days: 30
